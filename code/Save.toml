title = "Meine Testanwendung"
version = "1.4.2"
debug = "true"
release_date = "2024-01-15"
release_time = "14:30:00"

[server]
host = "127.0.0.1"
port = "8080"
workers = "4"

[server.security]
enable_tls = "true"
allowed_ips = ["192.168.1.1","10.0.0.5"]
rate_limit = "1000"

[database]
engine = "postgres"
host = "db.example.com"
port = "5432"
username = "admin"
password = "secret123"
max_connections = "20"

[database.replica]
enabled = "true"
hosts = ["yanis@gmail.com","db-replica2.example.com"]

[database.connection]
timeout = "30"
retry_attempts = "3"

[logging]
level = "INFO"
file = "/var/log/myapp/app.log"

[logging.rotation]
enabled = "true"
max_size_mb = "100"
keep_files = "10"

[features]
payment_system = "true"
beta_ui = "false"
new_recommendation_engine = "true"

